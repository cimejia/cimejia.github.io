<div class="container">
<h2>Publications</h2>
    <ul class="publications-list">
        <li class="publication-item">
            <a href="https://arxiv.org/abs/2402.15039" target="_blank" class="publication-link">
            <div class="publication-left">
            <span class="publication-title">Descripci&oacute;n autom&aacute;tica de secciones delgadas de rocas: una aplicaci&oacute;n Web</span>
            <span class="publication-authors">Stalyn Paucar, Christian Mejia-Escobar and Victor Collaguazo</span>
            </div></a>  
            <div class="publication-right">
            <span class="publication-journal">arXiv.org</span>
            <span class="publication-date">February, 2024</span>           
            </div>
            </a>    
        </li>
    </ul>
    <div id="publications-table"></div>
  </div>

<script>
fetch("MisPublicaciones.csv")
.then(response => response.text())
.then(data => {

let filas = data.split("\n");
let encabezados = filas[0].split(";");

let contenedor = document.getElementById("publications-table");

for(let i=1;i<filas.length;i++){

let columnas = filas[i].split(";");

let title = columnas[0];
let authors = columnas[1];
let year = columnas[3];
let journal = columnas[5];

let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="title">${title}</div>
<div class="authors">${authors}</div>
<div class="meta">${journal} (${year})</div>
`;

contenedor.appendChild(card);

}

});  
</script>
